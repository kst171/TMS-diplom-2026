name: Cloud Ansible & Kubernetes Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  # === ЭТАП 1: НАСТРОЙКА БАЗЫ И ZABBIX ЧЕРЕЗ ANSIBLE ===
  configure-aws-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Configure AWS credentials for Security Group update
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      # Динамически узнаем IP раннера и временно открываем порт 22 в SG Zabbix
      - name: Authorize GitHub Runner IP in Zabbix Security Group
        env:
          AWS_DEFAULT_REGION: eu-north-1
        run: |
          # Используем максимально стабильный и прямой сервис получения IP без лишних редиректов
          RUNNER_IP=$(curl -s https://ifconfig.me || curl -s https://ipify.org)
          
          # Строгая очистка строки от мусора
          RUNNER_IP=$(echo "$RUNNER_IP" | tr -d '\n' | tr -d '\r' | xargs)
          
          # Валидация IP-адреса (IPv4 регулярное выражение)
          if [[ ! "$RUNNER_IP" =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            echo "::error::Получен некорректный IP адрес: $RUNNER_IP"
            exit 1
          fi
          
          # Экспорт переменной в окружение GitHub Actions по актуальному стандарту
          echo "RUNNER_IP=$RUNNER_IP" >> "$GITHUB_ENV"
          echo "Успешно определен IP раннера: $RUNNER_IP"
          
          # Получаем ID группы безопасности (фильтруем по group-name, как настроено в вашем zabbix.tf)
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=zabbix-sg" --query "SecurityGroups[0].GroupId" --output text)
          
          if [ "$SG_ID" = "None" ] || [ -z "$SG_ID" ]; then
            echo "::error::Группа безопасности с именем 'zabbix-sg' не найдена в AWS!"
            exit 1
          fi
          
          echo "SG_ID=$SG_ID" >> "$GITHUB_ENV"
          echo "Найдена группа безопасности ID: $SG_ID"
          
          # Авторизуем IP адрес в AWS Security Group
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32"
          
          echo "Доступ по порту 22 для $RUNNER_IP успешно открыт."

      # Пробрасываем SSH-ключ развертывания из GitHub Secrets в память ssh-agent
      - name: Set up SSH Agent Forwarding
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Generate inventory.ini from Terraform outputs
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-north-1
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          cd terraform/
          terraform init

          ZABBIX_IP=$(terraform output -raw zabbix_public_ip)
          PRIMARY_IP=$(terraform output -raw database_primary_ip)
          REPLICA_IP=$(terraform output -raw database_replica_ip)

          cat > ../ansible/inventory.ini << EOF
          [aws_zabbix_servers]
          zabbix-server ansible_host=${ZABBIX_IP} ansible_user=ubuntu

          [app_databases]
          app-database         ansible_host=${PRIMARY_IP} ansible_user=ubuntu pg_role=primary
          app-database-replica ansible_host=${REPLICA_IP} ansible_user=ubuntu pg_role=replica

          [app_databases:vars]
          ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ForwardAgent=yes -o ProxyCommand="ssh -W %h:%p -q -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ubuntu@${ZABBIX_IP}"'

          [all:vars]
          ansible_ssh_private_key_file=""
          ansible_python_interpreter=/usr/bin/python3
          EOF

          echo "Generated inventory.ini:"
          cat ../ansible/inventory.ini

      # Запуск автоматизации Ansible по сгенерированному из Terraform инвентарю
      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REPLICATION_PASSWORD: ${{ secrets.REPLICATION_PASSWORD }}
        run: |
          cd ansible/
          ansible-playbook -i inventory.ini site.yml

      # Закрываем SSH in AWS Security Group при любом исходе выполнения плейбука
      - name: Revoke GitHub Runner IP from Security Group
        if: always()
        run: |
          if [ -n "${{ env.SG_ID }}" ] && [ -n "${{ env.RUNNER_IP }}" ]; then
            aws ec2 revoke-security-group-ingress --group-id ${{ env.SG_ID }} --protocol tcp --port 22 --cidr ${{ env.RUNNER_IP }}/32
          fi

  # === ЭТАП 2: СБОРКА FLASK И ДЕПЛОЙ В AWS EKS ===
  deploy-flask-to-kubernetes:
    runs-on: ubuntu-latest
    needs: configure-aws-infrastructure 
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/helpdesk-app:latest
            
      - name: Configure AWS credentials for EKS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name kst-diplom-eks-cluster --region eu-north-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      
      - name: Generate k8s/secret.yaml from Terraform outputs
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-north-1
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          cd terraform/
          terraform init
          
          PRIMARY_IP=$(terraform output -raw database_primary_ip)
          
          cat > ../k8s/secret.yaml << EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: helpdesk-secret
          type: Opaque
          data:
            DB_HOST: $(echo -n "${PRIMARY_IP}" | base64 -w 0)
            DB_USER: $(echo -n "db_user" | base64 -w 0)
            DB_PASSWORD: $(echo -n "${{ secrets.DB_PASSWORD }}" | base64 -w 0)
            DB_NAME: $(echo -n "fs_support_db" | base64 -w 0)
          EOF
          
          echo "Generated secret.yaml:"
          cat ../k8s/secret.yaml 
        
      # Подставляем уникальный хэш коммита вместо переменной в манифест Kubernetes и деплоим
      - name: Deploy to EKS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-north-1
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          # 1. Модифицируем тег Docker-образа в деплойменте
          sed -i "s|your-dockerhub-username/helpdesk-app:\${IMAGE_TAG}|${{ secrets.DOCKERHUB_USERNAME }}/helpdesk-app:latest|g" k8s/deployment.yaml
          
          # 2. Обновляем kubeconfig, явно указывая AWS CLI использовать системную роль создателя кластера
          # Это мгновенно дает раннеру права администратора (ClusterAdmin), так как создатель кластера всегда имеет полный доступ по умолчанию
          aws eks update-kubeconfig --name kst-diplom-eks-cluster --region eu-north-1
          
          # 3. Применяем манифесты в кластер EKS
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml





