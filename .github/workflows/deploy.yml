name: Cloud Ansible & Kubernetes Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  # === ЭТАП 1: НАСТРОЙКА БАЗЫ И ZABBIX ЧЕРЕЗ ANSIBLE ===
  configure-aws-infrastructure:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up SSH Agent Forwarding
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Run Ansible Playbook inside GitHub Cloud
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
      run: |
        cd ansible/
        ansible-playbook -i inventory.ini site.yml \
          --ssh-common-args="-o ControlMaster=no -o ControlPersist=no -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

  # === ЭТАП 2: СБОРКА FLASK И ДЕПЛОЙ В AWS EKS ===
  deploy-flask-to-kubernetes:
    runs-on: ubuntu-latest
    needs: configure-aws-infrastructure # Ждем, пока Ansible успешно настроит ВМ
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    # Настройка Docker Buildx для быстрой и оптимизированной сборки
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Авторизация в Docker Hub с использованием секретов репозитория
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Сборка образа Flask и отправка его в Docker Hub (с тегами latest и SHA коммита)
    - name: Build and push Docker image to Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/helpdesk-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/helpdesk-app:${{ github.sha }}

    # Авторизация в AWS (нужна только для управления kubectl в кластере EKS)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1

    # Обновление конфига kubectl для связи с вашим кластером из eks.tf
    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name kst-diplom-eks-cluster --region eu-north-1

    # Подстановка тега коммита в манифест и его применение в EKS
    - name: Deploy to EKS
      run: |
        sed -i "s|your-dockerhub-username/helpdesk-app:\${IMAGE_TAG}|${{ secrets.DOCKERHUB_USERNAME }}/helpdesk-app:${{ github.sha }}|g" k8s/helpdesk-deployment.yaml
        kubectl apply -f k8s/helpdesk-deployment.yaml
