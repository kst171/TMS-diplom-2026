name: Cloud Ansible & Kubernetes Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  # === ЭТАП 1: НАСТРОЙКА БАЗЫ И ZABBIX ЧЕРЕЗ ANSIBLE ===
  configure-aws-infrastructure:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up SSH Agent Forwarding
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Run Ansible Playbook inside GitHub Cloud
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
      run: |
        cd ansible/
        ansible-playbook -i inventory.ini site.yml \
          --ssh-common-args="-o ControlMaster=no -o ControlPersist=no -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

  # === ЭТАП 2: СБОРКА FLASK И ДЕПЛОЙ В AWS EKS ===
  deploy-flask-to-kubernetes:
    runs-on: ubuntu-latest
    needs: configure-aws-infrastructure # Ждем, пока Ansible успешно настроит ВМ
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    # Авторизация в AWS для работы с ECR и EKS
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1 # Ваш регион из VPC

    # Логин в AWS реестр контейнеров
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Сборка Docker-образа Flask и отправка его в ECR с тегом коммита
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: flask-repo # Имя вашего репозитория в ECR
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # Обновление конфига kubectl для связи с вашим кластером из eks.tf
    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name kst-diplom-eks-cluster --region eu-north-1

    # Подстановка тега в упрощенный манифест и его применение
    - name: Deploy to EKS
      run: |
        sed -i "s|\${IMAGE_TAG}|${{ github.sha }}|g" k8s/helpdesk-deployment.yaml
        kubectl apply -f k8s/helpdesk-deployment.yaml
