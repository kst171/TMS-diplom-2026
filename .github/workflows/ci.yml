name: CI — Lint & Smoke Test

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for tests
        run: |
          cat > .env << EOF
          DATABASE_URL=postgresql://support_user:support_pass@db:5432/support_db
          SECRET_KEY=test-secret-key
          FLASK_ENV=development
          TIMEZONE=Europe/Minsk
          EOF

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for app to be ready
        run: |
          for i in {1..15}; do
            curl -sf http://localhost:8000/health && echo "App is up!" && exit 0
            echo "Waiting... ($i)"
            sleep 3
          done
          echo "App did not start in time"
          docker-compose logs web
          exit 1

      - name: Smoke test — check main routes
        run: |
          curl -sf http://localhost:8000/ | grep -q "." && echo "/ OK"
          curl -sf http://localhost:8000/tickets | grep -q "." && echo "/tickets OK"

      - name: Cleanup
        if: always()
        run: docker compose down -v