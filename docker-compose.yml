
services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped        # "always" перезапускает даже после docker stop
    environment:
      POSTGRES_DB: support_db
      POSTGRES_USER: support_user
      POSTGRES_PASSWORD: support_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports не нужны — web обращается к db внутри сети Docker
    # expose: 5432 только если нужен доступ с хоста (pgAdmin и т.п.)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support_user -d support_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"                # порт совпадает с Gunicorn в Dockerfile
    env_file:
      - .env                       # секреты не хранятся в docker-compose.yml
    depends_on:
      db:
        condition: service_healthy
    # volumes: - .:/app  убираем: монтирование перезаписывает образ → Gunicorn
    #                              не нужен, изменения не проверяются в prod-режиме

volumes:
  postgres_data: