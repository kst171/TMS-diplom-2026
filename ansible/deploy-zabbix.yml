---
- name: Deploy Zabbix Server in Cloud EC2 via Docker
  hosts: aws_zabbix_servers
  become: yes
  gather_facts: false

  tasks:
    - name: Update apt cache and install prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
          - python3-setuptools
        state: present
        update_cache: yes
      register: apt_result
      until: apt_result is success
      retries: 5
      delay: 10

    - name: Install Docker.io and Docker Compose Plugin
      apt:
        name: 
          - docker.io
          - docker-compose-v2
        state: present

    - name: Ensure Docker service is active and enabled
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Create directory for Zabbix configuration
      file:
        path: /opt/zabbix
        state: directory
        mode: '0755'

    - name: Copy docker-compose file to EC2 instance
      copy:
        src: docker-compose.zabbix.yml
        dest: /opt/zabbix/docker-compose.yml
        mode: '0644'

    # Декларативный запуск Docker-стека с автоматическим пуллингом свежих слоев образов
    - name: Start or update Zabbix stack via Docker Compose
      community.docker.docker_compose_v2:
        project_src: /opt/zabbix
        state: present
        pull: always
