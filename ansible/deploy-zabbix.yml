---
- name: Deploy Zabbix Server in Cloud EC2 via Docker
  hosts: aws_zabbix_servers
  become: yes
  gather_facts: false
  tasks:
    - name: Update apt cache and install prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes
      # Защита от фонового cloud-init в AWS: пробуем 5 раз с паузой в 10 секунд
      register: apt_result
      until: apt_result is success
      retries: 5
      delay: 10

    - name: Install Docker.io and Docker Compose Plugin
      apt:
        # Устанавливаем современный плагин компрессии (docker-compose-v2 в Ubuntu)
        name: 
          - docker.io
          - docker-compose-v2
        state: present

    - name: Ensure Docker service is active and enabled
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Create directory for Zabbix configuration
      file:
        path: /opt/zabbix
        state: directory
        mode: '0755'

    - name: Copy docker-compose file to EC2 instance
      copy:
        src: docker-compose.zabbix.yml
        dest: /opt/zabbix/docker-compose.yml
      # Если файл поменяется, мы зафиксируем это для перезапуска контейнеров
      register: compose_file

    - name: Start Zabbix stack via Docker Compose
      shell: docker compose up -d
      args:
        chdir: /opt/zabbix
      # Выполнять команду только если контейнеры не запущены ИЛИ обновился файл конфигурации
      when: compose_file.changed or (ansible_operator_meta is not defined)
