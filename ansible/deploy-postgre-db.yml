---
- name: Install and Configure PostgreSQL Natively on Ubuntu
  hosts: app_databases
  become: yes
  gather_facts: true # Сбор системных фактов нужен для динамического вычисления путей к конфигам

  vars:
    pg_version: "{{ ans_facts_version | default('16') }}"

  pre_tasks:
    # Динамически устанавливаем коллекцию на хост, с которого запускается Ansible
    - name: Ensure community.postgresql collection is installed on runner
      delegate_to: localhost
      become: false
      ansible.builtin.command: ansible-galaxy collection install community.postgresql
      run_once: true

    # Скрипт-детектор мажорной версии СУБД для гибкости путей
    - name: Detect installed PostgreSQL version
      shell: "psql --version | awk '{print $3}' | cut -d. -f1"
      register: pg_version_detected
      changed_when: false
      failed_when: false

    - name: Set postgres version variable
      set_fact:
        pg_version: "{{ pg_version_detected.stdout if pg_version_detected.stdout != '' else '16' }}"

  tasks:
    - name: Install PostgreSQL server and python3-psycopg2
      apt:
        name: 
          - postgresql
          - postgresql-contrib
          - python3-psycopg2
          - acl
        state: present
        update_cache: yes
      register: apt_result
      until: apt_result is success
      retries: 10
      delay: 15

    - name: Ensure PostgreSQL is running and enabled
      systemd:
        name: "postgresql@{{ pg_version }}-main"
        state: started
        enabled: yes
    
    - name: Check PostgreSQL status
      command: systemctl status postgresql
      register: pg_status
      failed_when: false
      changed_when: false

    - name: Show PostgreSQL status
      debug:
        var: pg_status.stdout_lines

    - name: Wait for PostgreSQL to be ready
      wait_for:
        path: /var/run/postgresql/.s.PGSQL.5432
        state: present
        timeout: 60
    
    - name: Find real PostgreSQL service name
      shell: systemctl list-units --type=service | grep postgres
      register: pg_services
      changed_when: false
      failed_when: false

    - name: Show PostgreSQL services
      debug:
        var: pg_services.stdout_lines

    - name: Start real PostgreSQL service
      shell: |
        PG_SERVICE=$(systemctl list-units --type=service | grep 'postgresql@' | awk '{print $1}' | head -1)
        if [ -n "$PG_SERVICE" ]; then
          systemctl start $PG_SERVICE
          systemctl enable $PG_SERVICE
        fi
      become: yes

    - name: Configure PostgreSQL to listen on all IP addresses
      lineinfile:
        path: "/etc/postgresql/{{ pg_version }}/main/postgresql.conf"
        regexp: "^#?listen_addresses\\s*="
        line: "listen_addresses = '*'"
      notify: Restart PostgreSQL

    - name: Allow connections from internal VPC network
      blockinfile:
        path: "/etc/postgresql/{{ pg_version }}/main/pg_hba.conf"
        block: |
          # Разрешаем доступ из внутренней сети AWS VPC для Kubernetes
          host    all             all             10.0.0.0/16            scram-sha-256
      notify: Restart PostgreSQL

    - name: Create support application database
      community.postgresql.postgresql_db:
        name: "{{ db_name }}"
      become_user: postgres

    # 1. Сначала создаем системного пользователя БД (БЕЗ деструктивного статуса SUPERUSER)
    - name: Create database user
      community.postgresql.postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        role_attr_flags: "NOSUPERUSER,CREATEDB"
      become_user: postgres

    # 2. Создаем базу данных и НАПРЯМУЮ назначаем этого пользователя ее владельцем (owner)
    - name: Create support application database
      community.postgresql.postgresql_db:
        name: "{{ db_name }}"
        owner: "{{ db_user }}" # Передаем права владения пользователю приложения
      become_user: postgres

    - name: Force restart PostgreSQL to apply cloud socket configurations
      systemd:
        name: "postgresql@{{ pg_version }}-main"
        state: restarted

  handlers:
    - name: Restart PostgreSQL
      systemd:
        name: "postgresql@{{ pg_version }}-main"
        state: restarted
