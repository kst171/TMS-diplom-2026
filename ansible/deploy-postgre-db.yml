---
- name: Install and Configure PostgreSQL Natively on Ubuntu
  hosts: app_databases
  become: yes
  gather_facts: false
  vars:
    db_name: "fs_support_db"
    db_user: "db_user"
    db_password: "db_secure_password"
  tasks:
    - name: Install PostgreSQL server and contrib modules
      apt:
        name: 
          - postgresql
          - postgresql-contrib
          - python3-psycopg2
        state: present
        update_cache: yes
      # Перенесли на правильный уровень отступов и исправили опечатку в apt_result
      register: apt_result
      until: apt_result is success
      retries: 10
      delay: 15

    - name: Ensure PostgreSQL is running and enabled at boot
      systemd:
        name: postgresql
        state: started
        enabled: yes

    - name: Configure PostgreSQL to listen on all IP addresses
      lineinfile:
        path: /etc/postgresql/16/main/postgresql.conf
        regexp: "^#?listen_addresses\\s*="
        line: "listen_addresses = '*'"
      notify: Restart PostgreSQL

    - name: Allow connections from internal VPC network
      blockinfile:
        path: /etc/postgresql/16/main/pg_hba.conf
        block: |
          # Разрешаем доступ из внутренней сети AWS VPC для Kubernetes
          host    all             all             10.0.0.0/16            scram-sha-256
      notify: Restart PostgreSQL

    - name: Create database user
      community.postgresql.postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        role_attr_flags: "SUPERUSER"
      become_user: postgres

    - name: Create support application database
      community.postgresql.postgresql_db:
        name: "{{ db_name }}"
        owner: "{{ db_user }}"
      become_user: postgres

  handlers:
    - name: Restart PostgreSQL
      systemd:
        name: postgresql
        state: restarted
