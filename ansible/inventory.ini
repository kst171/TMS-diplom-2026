[aws_zabbix_servers]
zabbix-server ansible_host=51.20.251.161 zabbix_private_ip=10.0.101.104 ansible_user=ubuntu

[app_databases]
app-database         ansible_host=10.0.1.106 ansible_user=ubuntu pg_role=primary
app-database-replica ansible_host=10.0.1.228 ansible_user=ubuntu pg_role=replica

[app_databases:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ForwardAgent=yes -o ProxyCommand="ssh -W %h:%p -q -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ubuntu@51.20.251.161"'

[all:vars]
ansible_ssh_private_key_file=""
ansible_python_interpreter=/usr/bin/python3