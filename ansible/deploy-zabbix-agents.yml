---
- name: Install and Configure Zabbix Agent on all hosts
  hosts: app_databases
  become: yes
  gather_facts: true

  vars:
    zabbix_server_ip: "{{ hostvars['zabbix-server']['zabbix_private_ip'] }}"
    zabbix_version: "7.0"

  tasks:
    - name: Download Zabbix repository package
      get_url:
        url: "https://repo.zabbix.com/zabbix/7.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest+ubuntu24.04_all.deb"
        dest: /tmp/zabbix-release.deb
        mode: '0644'

    - name: Install Zabbix repository
      apt:
        deb: /tmp/zabbix-release.deb
        state: present

    - name: Install Zabbix agent2
      apt:
        name: zabbix-agent2
        state: present
        update_cache: yes
      register: apt_result
      until: apt_result is success
      retries: 5
      delay: 10

    - name: Configure Zabbix agent
      template:
        src: zabbix_agent2.conf.j2
        dest: /etc/zabbix/zabbix_agent2.conf
        mode: '0644'
      notify: Restart Zabbix Agent

    - name: Ensure Zabbix agent is running and enabled
      systemd:
        name: zabbix-agent2
        state: started
        enabled: yes

  handlers:
    - name: Restart Zabbix Agent
      systemd:
        name: zabbix-agent2
        state: restarted