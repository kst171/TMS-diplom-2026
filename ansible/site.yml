---
# Главный оркестратор развертывания инфраструктуры приложений

# Этап 1: Развертывание Docker-контейнеров Zabbix 7.0 на публичной EC2 ВМ
- name: Import Zabbix deployment configuration
  import_playbook: deploy-zabbix.yml

# Этап 2: Развертывание нативной PostgreSQL 16 в приватной подсети
- name: Import PostgreSQL deployment configuration
  import_playbook: deploy-postgre-db.yml

# Этап 3: Настройка streaming replication между primary и replica
- name: Import PostgreSQL replication configuration
  import_playbook: deploy-postgres-replication.yml

# Этап 4: Установка Zabbix агентов на все хосты
- name: Import Zabbix agents deployment
  import_playbook: deploy-zabbix-agents.yml  