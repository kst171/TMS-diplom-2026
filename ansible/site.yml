---
# ansible/site.yml
# Главный оркестратор развертывания инфраструктуры

# Шаг 1: Сначала настраиваем сервер мониторинга Zabbix (он же Bastion/мост для SSH)
- name: Import Zabbix deployment configuration
  import_playbook: deploy-zabbix.yml

# Шаг 2: Только после этого настраиваем PostgreSQL в приватной подсети
- name: Import PostgreSQL deployment configuration
  import_playbook: deploy-postgre-db.yml
