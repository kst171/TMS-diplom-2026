---
- name: Configure PostgreSQL Primary for Replication
  hosts: app_databases
  become: yes
  gather_facts: true

  vars:
    pg_version: "16"
    replication_user: "replicator"
    primary_ip: "{{ hostvars['app-database']['ansible_host'] }}"

  pre_tasks:
    - name: Detect installed PostgreSQL version
      shell: "psql --version | awk '{print $3}' | cut -d. -f1"
      register: pg_version_detected
      changed_when: false
      failed_when: false

    - name: Set postgres version variable
      set_fact:
        pg_version: "{{ pg_version_detected.stdout if pg_version_detected.stdout != '' else '16' }}"

  tasks:

    # ── PRIMARY ──────────────────────────────────────────────────────────────
    - name: Configure WAL level for replication (primary only)
      lineinfile:
        path: "/etc/postgresql/{{ pg_version }}/main/postgresql.conf"
        regexp: "^#?wal_level\\s*="
        line: "wal_level = replica"
      when: pg_role == 'primary'
      notify: Restart PostgreSQL

    - name: Configure max_wal_senders (primary only)
      lineinfile:
        path: "/etc/postgresql/{{ pg_version }}/main/postgresql.conf"
        regexp: "^#?max_wal_senders\\s*="
        line: "max_wal_senders = 3"
      when: pg_role == 'primary'
      notify: Restart PostgreSQL

    - name: Configure wal_keep_size (primary only)
      lineinfile:
        path: "/etc/postgresql/{{ pg_version }}/main/postgresql.conf"
        regexp: "^#?wal_keep_size\\s*="
        line: "wal_keep_size = 64"
      when: pg_role == 'primary'
      notify: Restart PostgreSQL

    - name: Allow replication connection in pg_hba.conf (primary only)
      blockinfile:
        path: "/etc/postgresql/{{ pg_version }}/main/pg_hba.conf"
        marker: "# {mark} REPLICATION ACCESS"
        block: |
          host    replication     replicator      10.0.0.0/16     scram-sha-256
      when: pg_role == 'primary'
      notify: Restart PostgreSQL

    - name: Flush handlers before creating replication user
      meta: flush_handlers
      when: pg_role == 'primary'

    - name: Wait for PostgreSQL socket after restart (primary)
      wait_for:
        path: /var/run/postgresql/.s.PGSQL.5432
        state: present
        timeout: 30
      when: pg_role == 'primary'

    - name: Create replication user (primary only)
      community.postgresql.postgresql_user:
        name: "{{ replication_user }}"
        password: "{{ replication_password }}"
        role_attr_flags: "REPLICATION,LOGIN"
      become_user: postgres
      when: pg_role == 'primary'

    # ── REPLICA ──────────────────────────────────────────────────────────────
    - name: Stop PostgreSQL on replica
      systemd:
        name: "postgresql@{{ pg_version }}-main"
        state: stopped
      when: pg_role == 'replica'

    - name: Clear replica data directory
      file:
        path: "/var/lib/postgresql/{{ pg_version }}/main"
        state: absent
      when: pg_role == 'replica'

    - name: Clone primary data to replica via pg_basebackup
      shell: >
        pg_basebackup
        -h {{ primary_ip }}
        -U {{ replication_user }}
        -D /var/lib/postgresql/{{ pg_version }}/main
        -P -Xs -R
      environment:
        PGPASSWORD: "{{ replication_password }}"
      become_user: postgres
      when: pg_role == 'replica'

    - name: Set correct permissions on replica data directory
      file:
        path: "/var/lib/postgresql/{{ pg_version }}/main"
        owner: postgres
        group: postgres
        mode: '0700'
        recurse: yes
      when: pg_role == 'replica'

    - name: Start PostgreSQL on replica
      systemd:
        name: "postgresql@{{ pg_version }}-main"
        state: started
        enabled: yes
      when: pg_role == 'replica'

  handlers:
    - name: Restart PostgreSQL
      systemd:
        name: "postgresql@{{ pg_version }}-main"
        state: restarted